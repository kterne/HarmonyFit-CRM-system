<!DOCTYPE html>

<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../icons/favicon-crm.svg" type="image/svg+xml">
  <title>Вхід — HarmonyFit CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/login.css">

</head>

<body>
  <div class="login-wrap">

    <!-- ── Логотип ─────────────────────────────────── -->
    <div class="login-brand">
      <div class="login-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
      </div>

      <div class="login-brand-name">
        HarmonyFit
        <span>CRM-система</span>
      </div>
    </div>

    <!-- ── Картка входу ────────────────────────────── -->
    <div class="login-card">
      <h1>Вхід</h1>
      <p class="subtitle">Введіть свої дані для входу до системи</p>

      <div class="login-alert hidden" id="loginError" role="alert">
        Невірна адреса електронної пошти або пароль.
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Електронна пошта</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input type="email" id="email" name="email" class="form-control" placeholder="Введіть адресу" autocomplete="email">
          </div>
          <div class="field-error hidden" id="emailError">Введіть коректну адресу електронної пошти</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Пароль</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
          </div>
          <div class="field-error hidden" id="passwordError">Введіть пароль</div>
        </div>

        <button type="submit" class="btn btn-primary login-submit" id="loginBtn">
          Увійти
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="../js/login.js"></script>

</body>
</html>
