<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../icons/favicon-crm.svg" type="image/svg+xml">
  <title>Абонементи — HarmonyFit CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/subscriptions.css">
</head>
<body>
<div class="app-shell">

  <!-- ── Бічна панель ─────────────────────────────── -->
  <aside class="sidebar">
    <a href="#" class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
      </div>
      <div class="sidebar-logo-text">
        HarmonyFit
        <span>CRM-система</span>
      </div>
    </a>

    <ul class="sidebar-nav">
      <li>
        <a href="schedule.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Розклад
        </a>
      </li>
      <li>
        <a href="clients.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Клієнти і тренери
        </a>
      </li>
      <li>
        <a href="subscriptions.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
            <line x1="1" y1="10" x2="23" y2="10"/>
          </svg>
          Абонементи
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="userInitials">МН</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">Менеджер</div>
          <div class="sidebar-user-role" id="userRole">Менеджер</div>
        </div>
        <button class="sidebar-logout" id="logoutBtn" title="Вийти">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Основний контент ─────────────────────────── -->
  <main class="main-content">

    <!-- ── Заголовок сторінки ──────────────────────── -->
    <div class="page-header">
      <nav class="breadcrumb-nav">
        <span>CRM</span>
        <span class="sep">›</span>
        <span class="current">Абонементи</span>
      </nav>
      <div class="page-title-row">
        <h1 class="page-title">Типи абонементів</h1>
        <div class="page-actions">
          <button type="button" class="btn btn-primary" id="addSubTypeBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Новий тип
          </button>
        </div>
      </div>
    </div>

    <!-- ── Тіло сторінки ───────────────────────────── -->
    <div class="page-body">

      <!-- ── Рядок статистики ────────────────────────── -->
      <div class="sub-stats-row" id="subStatsRow">
        <div class="stat-card">
          <div class="stat-label">Типів абонементів</div>
          <div class="stat-value" id="statTypesCount">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Активних абонементів</div>
          <div class="stat-value" id="statActiveCount">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Закінчуються (≤7 днів)</div>
          <div class="stat-value" id="statExpiringCount">—</div>
          <div class="stat-sub">потребують уваги</div>
        </div>
      </div>

      <!-- ── Сітка карток ────────────────────────────── -->
      <div class="sub-cards-grid" id="subTypesGrid"></div>

    </div><!-- /тіло сторінки -->
  </main>
</div>

<!-- ── Модалка: створення / редагування типу абонемента ── -->
<div class="modal-backdrop hidden" id="subTypeModal" aria-hidden="true">
  <div class="modal modal-sub-type" role="dialog" aria-labelledby="subTypeModalTitle">
    <div class="modal-header">
      <h2 class="modal-title" id="subTypeModalTitle">Новий тип абонементу</h2>
      <button type="button" class="modal-close" id="subTypeModalClose" aria-label="Закрити">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="subTypeForm" novalidate>
        <input type="hidden" id="subTypeId">
        <div class="form-group">
          <label class="form-label" for="subTypeName">Назва</label>
          <input type="text" class="form-control" id="subTypeName" placeholder="8 занять">
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label" for="subTypeVisits">Кількість занять</label>
            <input type="number" class="form-control" id="subTypeVisits" min="1" max="100" placeholder="8">
          </div>
          <div class="form-group">
            <label class="form-label" for="subTypeDuration">Термін дії (днів)</label>
            <input type="number" class="form-control" id="subTypeDuration" min="1" placeholder="30">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="subTypePrice">Ціна (грн)</label>
          <input type="number" class="form-control" id="subTypePrice" min="0" placeholder="2400">
        </div>
        <div class="form-group">
          <label class="form-label" for="subTypeDesc">Опис</label>
          <textarea class="form-control" id="subTypeDesc" rows="2" placeholder="Короткий опис абонементу..."></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer modal-footer--start" id="subTypeModalFooter">
      <div class="modal-footer-actions">
        <button type="submit" form="subTypeForm" class="btn btn-primary" id="subTypeModalSave">Зберегти</button>
        <button type="button" class="btn btn-secondary" id="subTypeModalCancel">Скасувати</button>
      </div>
      <button type="button" class="btn btn-danger hidden" id="subTypeModalDelete">Видалити</button>
    </div>
  </div>
</div>

<!-- ── Контейнер сповіщень (toast) ──────────────── -->
<div class="toast-container" id="toastContainer"></div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var modal = document.getElementById('subTypeModal');
    if (!modal) return;
    function openFallback() {
      modal.classList.remove('hidden');
      modal.setAttribute('aria-hidden', 'false');
    }
    function closeFallback() {
      modal.classList.add('hidden');
      modal.setAttribute('aria-hidden', 'true');
    }
    document.getElementById('addSubTypeBtn')?.addEventListener('click', function (e) {
      if (window.__subscriptionsModuleReady) return;
      e.preventDefault();
      openFallback();
    });
    document.getElementById('subTypeModalClose')?.addEventListener('click', closeFallback);
    document.getElementById('subTypeModalCancel')?.addEventListener('click', closeFallback);
    modal.addEventListener('click', function (e) {
      if (e.target === modal) closeFallback();
    });
  });
</script>
<script type="module" src="../js/subscriptions.js"></script>
</body>
</html>
